spring.application.name=sustentabilidade
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ESG}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:esg123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
server.port=${SERVER_PORT:8080}
spring.flyway.enabled=true
spring.flyway.locations=classpath:sql