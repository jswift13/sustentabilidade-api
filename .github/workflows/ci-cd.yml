name: CI/CD Pipeline - Sustentabilidade API

on:
  push:
    branches: [main, develop]

run-name: "Pipeline ${{ github.ref_name }} - ${{ github.actor }}"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_PASSWORD: oracle123
          APP_USER: ESG
          APP_USER_PASSWORD: esg123
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Testes unitários e integração
        run: ./mvnw test
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1521/XEPDB1
          SPRING_DATASOURCE_USERNAME: ESG
          SPRING_DATASOURCE_PASSWORD: esg123
          SPRING_PROFILES_ACTIVE: ci

  deploy-staging:
    name: Deploy Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem Docker
        run: docker build -t sustentabilidade-api:staging .

      - name: Deploy staging
        run: |
          docker run -d \
            --name api-staging \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:oracle:thin:@localhost:1521/XEPDB1 \
            -e SPRING_DATASOURCE_USERNAME=ESG \
            -e SPRING_DATASOURCE_PASSWORD=esg123 \
            -e SPRING_PROFILES_ACTIVE=staging \
            -e SPRING_FLYWAY_ENABLED=false \
            sustentabilidade-api:staging
          echo "✅ Staging no ar - porta 8080"

  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem Docker
        run: docker build -t sustentabilidade-api:production .

      - name: Deploy production
        run: |
          docker run -d \
            --name api-production \
            -p 8081:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:oracle:thin:@localhost:1521/XEPDB1 \
            -e SPRING_DATASOURCE_USERNAME=ESG \
            -e SPRING_DATASOURCE_PASSWORD=esg123 \
            -e SPRING_PROFILES_ACTIVE=production \
            -e SPRING_FLYWAY_ENABLED=false \
            sustentabilidade-api:production
          echo "✅ Production no ar - porta 8081"