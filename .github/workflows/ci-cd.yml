name: CI/CD Pipeline - Sustentabilidade API

on:
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_PASSWORD: oracle123
          APP_USER: ESG
          APP_USER_PASSWORD: esg123
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1521/XEPDB1
          SPRING_DATASOURCE_USERNAME: ESG
          SPRING_DATASOURCE_PASSWORD: esg123

      - name: Start API and Run Tests
        run: |
          # Sobe a API em background
          nohup java -jar target/*.jar > api-log.txt 2>&1 &
          
          echo "Aguardando API e Banco estabilizarem (60s)..."
          sleep 60
          
          # Tenta rodar os testes de BDD
          ./mvnw test -Dtest=runner.TestRunner
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1521/XEPDB1
          SPRING_DATASOURCE_USERNAME: ESG
          SPRING_DATASOURCE_PASSWORD: esg123

  deploy-staging:
    name: Deploy Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build imagem Docker
        run: docker build -t sustentabilidade-api:staging .
      - name: Deploy staging
        run: echo "✅ Staging concluído"

  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build imagem Docker
        run: docker build -t sustentabilidade-api:production .
      - name: Deploy production
        run: echo "✅ Production concluído"