name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_PASSWORD: oracle123
          APP_USER: ESG
          APP_USER_PASSWORD: esg123
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Testes unitários
        run: ./mvnw test
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1521/XEPDB1
          SPRING_DATASOURCE_USERNAME: ESG
          SPRING_DATASOURCE_PASSWORD: esg123

      - name: Subir API para smoke tests
        run: |
          java -jar target/*.jar &
          echo "Aguardando API inicializar..."
          sleep 30
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1521/XEPDB1
          SPRING_DATASOURCE_USERNAME: ESG
          SPRING_DATASOURCE_PASSWORD: esg123
          SERVER_PORT: 8080

      - name: Smoke tests — endpoints reais
        run: |
          echo "=== GET /api/setores ==="
          curl -f -u user:user123 http://localhost:8080/api/setores
          echo ""

          echo "=== GET /api/indicadores/sustentabilidade ==="
          curl -f -u user:user123 \
            "http://localhost:8080/api/indicadores/sustentabilidade?de=2025-01-01&ate=2025-12-31"
          echo ""

          echo "=== GET /api/ranking/setores ==="
          curl -f -u user:user123 \
            "http://localhost:8080/api/ranking/setores?de=2025-01-01&ate=2025-12-31"
          echo ""

          echo "=== Teste de segurança: sem credenciais deve retornar 401 ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/setores)
          if [ "$STATUS" = "401" ]; then
            echo "✅ Segurança OK - retornou 401"
          else
            echo "❌ Falha de segurança - esperado 401, recebeu $STATUS"
            exit 1
          fi

          echo "=== Teste de segurança: USER tentando POST deve retornar 403 ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u user:user123 \
            -X POST -H "Content-Type: application/json" \
            -d '{"idSetor":1,"nomeEquipamento":"Teste","potenciaWatts":100,"status":"ATIVO"}' \
            http://localhost:8080/api/equipamentos)
          if [ "$STATUS" = "403" ]; then
            echo "✅ Autorização OK - retornou 403"
          else
            echo "❌ Falha de autorização - esperado 403, recebeu $STATUS"
            exit 1
          fi

          echo "=== Todos os smoke tests passaram ✅ ==="

  deploy-staging:
    name: Deploy Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem Docker
        run: docker build -t sustentabilidade-api:staging .

      - name: Deploy staging
        run: |
          docker run -d \
            --name api-staging \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:oracle:thin:@localhost:1521/XEPDB1 \
            -e SPRING_DATASOURCE_USERNAME=ESG \
            -e SPRING_DATASOURCE_PASSWORD=esg123 \
            -e SPRING_PROFILES_ACTIVE=staging \
            -e SPRING_FLYWAY_ENABLED=false \
            sustentabilidade-api:staging
          echo "✅ Staging no ar - porta 8080"

  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem Docker
        run: docker build -t sustentabilidade-api:production .

      - name: Deploy production
        run: |
          docker run -d \
            --name api-production \
            -p 8081:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:oracle:thin:@localhost:1521/XEPDB1 \
            -e SPRING_DATASOURCE_USERNAME=ESG \
            -e SPRING_DATASOURCE_PASSWORD=esg123 \
            -e SPRING_PROFILES_ACTIVE=production \
            -e SPRING_FLYWAY_ENABLED=false \
            sustentabilidade-api:production
          echo "✅ Production no ar - porta 8081"